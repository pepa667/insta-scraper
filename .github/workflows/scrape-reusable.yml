name: Instagram Feed — Reusable Sync

# Workflow reutilizável: qualquer repo cliente chama este workflow via workflow_call.
# Secrets necessários no repo cliente:
#   SCRAPER_API_KEY  — chave scrape.do (pode ser compartilhada entre clientes)
#   INSTA_USERNAME   — username Instagram deste cliente
#   INSTA_SESSION_ID — cookie sessionid do Instagram deste cliente

on:
  workflow_call:
    inputs:
      post_count:
        description: 'Quantos posts baixar (default: 9)'
        required: false
        type: number
        default: 9
      image_prefix:
        description: 'Prefixo dos ficheiros de imagem (default: instaFoto_)'
        required: false
        type: string
        default: 'instaFoto_'
      image_ext:
        description: 'Extensão dos ficheiros de imagem, sem ponto (default: jpg)'
        required: false
        type: string
        default: 'jpg'
      images_dir:
        description: 'Pasta destino das imagens, relativa ao workspace (default: www/images/insta)'
        required: false
        type: string
        default: 'www/images/insta'
      images_public_path:
        description: 'Caminho público usado no insta-links.json (default: images/insta)'
        required: false
        type: string
        default: 'images/insta'
      links_json_path:
        description: 'Caminho do ficheiro JSON de output, relativo ao workspace (default: www/insta-links.json)'
        required: false
        type: string
        default: 'www/insta-links.json'
    secrets:
      SCRAPER_API_KEY:
        required: true
      INSTA_USERNAME:
        required: true
      INSTA_SESSION_ID:
        required: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1. Checkout do repo CLIENTE (o repo que chamou este workflow)
      - name: Checkout client repo
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      # 2. Extrai o nome deste repo central a partir do workflow_ref
      #    github.workflow_ref = "OWNER/REPO/.github/workflows/FILE.yml@refs/heads/BRANCH"
      - name: Extract central repo
        id: central
        run: echo "repo=$(echo '${{ github.workflow_ref }}' | cut -d'/' -f1-2)" >> $GITHUB_OUTPUT

      # 3. Busca apenas o script deste repo central (sem clonar tudo)
      - name: Checkout scraper script
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.central.outputs.repo }}
          path: _scraper
          sparse-checkout: |
            insta/sync.js
          sparse-checkout-cone-mode: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Prepare output directories
        run: mkdir -p "${{ inputs.images_dir || 'www/images/insta' }}"

      - name: Run Instagram Scraper
        env:
          SCRAPER_API_KEY: ${{ secrets.SCRAPER_API_KEY }}
          INSTA_USERNAME: ${{ secrets.INSTA_USERNAME }}
          INSTA_SESSION_ID: ${{ secrets.INSTA_SESSION_ID }}
          POST_COUNT: ${{ inputs.post_count || 9 }}
          IMAGE_PREFIX: ${{ inputs.image_prefix || 'instaFoto_' }}
          IMAGE_EXT: ${{ inputs.image_ext || 'jpg' }}
          IMAGES_DIR: ${{ github.workspace }}/${{ inputs.images_dir || 'www/images/insta' }}
          IMAGES_PUBLIC_PATH: ${{ inputs.images_public_path || 'images/insta' }}
          LINKS_JSON_PATH: ${{ github.workspace }}/${{ inputs.links_json_path || 'www/insta-links.json' }}
          DEBUG_HTML_PATH: ${{ github.workspace }}/www/debug-insta.html
        run: node _scraper/insta/sync.js

      - name: Upload debug artifact (disponivel mesmo em caso de falha)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-insta-html
          path: www/debug-insta.html
          if-no-files-found: ignore
          retention-days: 3

      - name: Commit and Push Changes
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.images_dir || 'www/images/insta' }}/"
          git add "${{ inputs.links_json_path || 'www/insta-links.json' }}"
          if git diff --cached --quiet; then
            echo "Nenhuma modificação pendente no feed estático."
          else
            git commit -m "chore: update instagram static feed images [skip ci]"
            git push
          fi
